<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tchat - Видеочат без регистрации</title>
    <link rel="stylesheet" href="/client/styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <h1>Tchat</h1>
        <p class="subtitle">Найдите собеседника и начните безопасный видеозвонок</p>
      </header>

      <section id="profileSection" class="panel">
        <h2>Профиль</h2>
        <p class="muted">Заполните профиль перед входом в список участников.</p>
        <div class="grid-two">
          <label class="field">
            <span>Ваш ник (латиница/цифры)</span>
            <input id="handleInput" type="text" placeholder="например, ali_01" maxlength="24" />
          </label>
          <label class="field">
            <span>Отображаемое имя</span>
            <input id="displayNameInput" type="text" placeholder="Например, Ali" maxlength="40" />
          </label>
        </div>
        <label class="field">
          <span>Аватар URL (опционально)</span>
          <input id="avatarInput" type="url" placeholder="https://example.com/avatar.jpg" maxlength="300" />
        </label>
        <button id="saveProfileBtn" class="btn">Войти в платформу</button>
      </section>

      <section id="lobbySection" class="panel hidden">
        <div class="row-between">
          <div>
            <h2>Участники онлайн</h2>
            <p id="welcomeText" class="muted"></p>
          </div>
          <button id="refreshUsersBtn" class="btn btn-light">Обновить</button>
        </div>
        <div id="onlineList" class="user-list"></div>
        <p id="lobbyEmptyText" class="muted hidden">Сейчас никого нет онлайн.</p>
      </section>

      <section id="callSection" class="panel hidden">
        <div class="row-between">
          <h2>Звонок</h2>
          <button id="endCallBtn" class="btn btn-danger">Завершить</button>
        </div>
        <p id="callInfo" class="muted">Ожидание подключения...</p>
        <article class="video-grid">
          <div class="video-box">
            <h3>Вы</h3>
            <video id="localVideo" autoplay muted playsinline></video>
          </div>
          <div class="video-box">
            <h3>Собеседник</h3>
            <video id="remoteVideo" autoplay playsinline></video>
          </div>
        </article>
        <div class="actions">
          <button id="toggleCameraBtn" class="btn">Камера: вкл</button>
          <button id="toggleMicBtn" class="btn">Микрофон: вкл</button>
        </div>
      </section>

      <section id="inviteSection" class="panel hidden">
        <h2>Входящие приглашения</h2>
        <div id="inviteList" class="invite-list"></div>
      </section>

      <section class="panel">
        <p id="status">Статус: инициализация...</p>
      </section>
    </main>

    <script type="module" src="/client/app.js"></script>
  </body>
</html>
